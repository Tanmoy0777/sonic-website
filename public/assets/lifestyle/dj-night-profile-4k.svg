<svg xmlns='http://www.w3.org/2000/svg' width='3840' height='2160' viewBox='0 0 3840 2160' role='img' aria-label='DJ Night Profile'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#05070B'/>
      <stop offset='100%' stop-color='#121A28'/>
    </linearGradient>
    <radialGradient id='glow' cx='64%' cy='34%' r='56%'>
      <stop offset='0%' stop-color='#A4BFFF' stop-opacity='0.42'/>
      <stop offset='100%' stop-color='#5B8CFF' stop-opacity='0'/>
    </radialGradient>
    <linearGradient id='skin' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#FFD3B0'/>
      <stop offset='100%' stop-color='#D6A887'/>
    </linearGradient>
    <linearGradient id='fit' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='#151D2A'/>
      <stop offset='100%' stop-color='#0C1018'/>
    </linearGradient>
    <linearGradient id='accent' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#4870CC'/>
      <stop offset='100%' stop-color='#739DFF'/>
    </linearGradient>
    <filter id='drop' x='-30%' y='-30%' width='160%' height='160%'>
      <feDropShadow dx='0' dy='26' stdDeviation='24' flood-color='#02040A' flood-opacity='0.86'/>
    </filter>
  </defs>
  <rect width='100%' height='100%' fill='url(#bg)'/>
  <rect width='100%' height='100%' fill='url(#glow)'/>

  <g transform='translate(1890 1180)' filter='url(#drop)'>
    <ellipse cx='0' cy='-350' rx='240' ry='300' fill='url(#skin)'/>
    <path d='M-340 640 C-320 240 -160 90 0 90 C160 90 320 240 340 640' fill='url(#fit)'/>
    <rect x='-420' y='490' width='840' height='480' rx='220' fill='url(#fit)'/>
    <path d='M-290 -520 C-250 -800 250 -800 290 -520' stroke='url(#accent)' stroke-width='52' fill='none' stroke-linecap='round'/>
    <ellipse cx='-338' cy='-230' rx='140' ry='200' fill='url(#accent)'/>
    <ellipse cx='338' cy='-230' rx='140' ry='200' fill='url(#accent)'/>
    <ellipse cx='-376' cy='-280' rx='80' ry='70' fill='#FFFFFF' fill-opacity='0.3'/>
    <ellipse cx='60' cy='-430' rx='70' ry='44' fill='#FFFFFF' fill-opacity='0.2'/>
  </g>

  <g font-family='"Space Grotesk", sans-serif' fill='#ECF2FF'>
    <text x='220' y='306' font-size='54' letter-spacing='8' opacity='0.86'>SONIC LIFESTYLE SERIES</text>
    <text x='220' y='395' font-size='94' font-weight='700'>DJ NIGHT PROFILE</text>
    <text x='220' y='2020' font-size='30' letter-spacing='5' opacity='0.72'>AI-STYLED CONCEPT MODEL VISUAL  •  4K ARTBOARD  •  PREMIUM DARK GRADIENT THEME</text>
  </g>
