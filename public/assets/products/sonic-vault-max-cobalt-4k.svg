<svg xmlns='http://www.w3.org/2000/svg' width='3840' height='2160' viewBox='0 0 3840 2160' role='img' aria-label='Sonic Vault Max cobalt'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#05070B'/>
      <stop offset='50%' stop-color='#0D111C'/>
      <stop offset='100%' stop-color='#121A24'/>
    </linearGradient>
    <radialGradient id='glowA' cx='48%' cy='38%' r='44%'>
      <stop offset='0%' stop-color='#8CADFF' stop-opacity='0.55'/>
      <stop offset='100%' stop-color='#1C429E' stop-opacity='0'/>
    </radialGradient>
    <radialGradient id='glowB' cx='68%' cy='72%' r='40%'>
      <stop offset='0%' stop-color='#6BA8FF' stop-opacity='0.2'/>
      <stop offset='100%' stop-color='#06080E' stop-opacity='0'/>
    </radialGradient>
    <linearGradient id='metal' x1='0' y1='0' x2='1' y2='0'>
      <stop offset='0%' stop-color='#2C323D'/>
      <stop offset='45%' stop-color='#B3BCC9'/>
      <stop offset='55%' stop-color='#F1F4FA'/>
      <stop offset='100%' stop-color='#2B3240'/>
    </linearGradient>
    <linearGradient id='body' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#1D45A5'/>
      <stop offset='55%' stop-color='#2E6BFF'/>
      <stop offset='100%' stop-color='#5788FF'/>
    </linearGradient>
    <radialGradient id='highlight' cx='35%' cy='30%' r='70%'>
      <stop offset='0%' stop-color='#FFFFFF' stop-opacity='0.5'/>
      <stop offset='100%' stop-color='#FFFFFF' stop-opacity='0'/>
    </radialGradient>
    <filter id='drop' x='-30%' y='-30%' width='160%' height='160%'>
      <feDropShadow dx='0' dy='40' stdDeviation='35' flood-color='#02040A' flood-opacity='0.9'/>
    </filter>
    <filter id='soft' x='-50%' y='-50%' width='200%' height='200%'>
      <feGaussianBlur stdDeviation='16'/>
    </filter>
    <pattern id='grain' width='120' height='120' patternUnits='userSpaceOnUse'>
      <rect width='120' height='120' fill='transparent'/>
      <circle cx='65' cy='90' r='1' fill='#FFFFFF' fill-opacity='0.07'/>
      <circle cx='105' cy='25' r='1' fill='#FFFFFF' fill-opacity='0.05'/>
      <circle cx='35' cy='105' r='1' fill='#FFFFFF' fill-opacity='0.09'/>
    </pattern>
  </defs>
  <rect width='3840' height='2160' fill='url(#bg)'/>
  <rect width='3840' height='2160' fill='url(#glowA)'/>
  <rect width='3840' height='2160' fill='url(#glowB)'/>
  <rect width='3840' height='2160' fill='url(#grain)'/>
  <ellipse cx='1920' cy='1680' rx='860' ry='180' fill='#010207' fill-opacity='0.7' filter='url(#soft)'/>

    <g transform='translate(1920 1110)' filter='url(#drop)'>
      <rect x='-360' y='-680' width='720' height='1360' rx='140' fill='url(#body)'/>
      <rect x='-320' y='-620' width='640' height='1240' rx='120' fill='#0A0F16' fill-opacity='0.38'/>
      <circle cx='0' cy='-220' r='178' fill='none' stroke='#779EFF' stroke-width='26'/>
      <circle cx='0' cy='220' r='232' fill='none' stroke='#6290FF' stroke-width='30'/>
      <circle cx='0' cy='220' r='98' fill='#121C2A'/>
      <circle cx='0' cy='-220' r='74' fill='#111927'/>
      <rect x='-250' y='530' width='500' height='36' rx='18' fill='#81A6FF' fill-opacity='0.75'/>
    </g>

  <g font-family='"Space Grotesk", "Avenir Next", sans-serif' fill='#F5F8FF'>
    <text x='220' y='280' font-size='50' letter-spacing='9' opacity='0.86'>SONIC</text>
    <text x='220' y='350' font-size='94' font-weight='700'>SONIC VAULT MAX</text>
    <text x='220' y='422' font-size='44' opacity='0.84'>PREMIUM SPEAKERS   /   COBALT</text>
    <text x='220' y='2030' font-size='30' letter-spacing='5' opacity='0.7'>AAUDIO ECOSYSTEM  •  SPATIAL AUDIO  •  APP-CONTROLLED EQ  •  HYBRID ANC</text>
  </g>
</svg>
