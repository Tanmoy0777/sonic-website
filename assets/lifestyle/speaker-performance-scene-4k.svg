<svg xmlns='http://www.w3.org/2000/svg' width='3840' height='2160' viewBox='0 0 3840 2160' role='img' aria-label='Speaker Performance Scene'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#05070B'/>
      <stop offset='100%' stop-color='#121A28'/>
    </linearGradient>
    <radialGradient id='glow' cx='64%' cy='34%' r='56%'>
      <stop offset='0%' stop-color='#9BD3EA' stop-opacity='0.42'/>
      <stop offset='100%' stop-color='#4AB0D9' stop-opacity='0'/>
    </radialGradient>
    <linearGradient id='skin' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#FFD3B0'/>
      <stop offset='100%' stop-color='#D6A887'/>
    </linearGradient>
    <linearGradient id='fit' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='#151D2A'/>
      <stop offset='100%' stop-color='#0C1018'/>
    </linearGradient>
    <linearGradient id='accent' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#3B8CAD'/>
      <stop offset='100%' stop-color='#65BBDE'/>
    </linearGradient>
    <filter id='drop' x='-30%' y='-30%' width='160%' height='160%'>
      <feDropShadow dx='0' dy='26' stdDeviation='24' flood-color='#02040A' flood-opacity='0.86'/>
    </filter>
  </defs>
  <rect width='100%' height='100%' fill='url(#bg)'/>
  <rect width='100%' height='100%' fill='url(#glow)'/>

  <g transform='translate(1880 1230)' filter='url(#drop)'>
    <ellipse cx='0' cy='-300' rx='240' ry='300' fill='url(#skin)'/>
    <rect x='-380' y='130' width='760' height='780' rx='240' fill='url(#fit)'/>
    <rect x='-220' y='730' width='440' height='230' rx='110' fill='url(#fit)'/>
    <rect x='-420' y='420' width='840' height='140' rx='70' fill='url(#accent)' fill-opacity='0.8'/>
    <circle cx='-200' cy='490' r='86' fill='#0B0F18'/>
    <circle cx='200' cy='490' r='86' fill='#0B0F18'/>
    <ellipse cx='-70' cy='-420' rx='88' ry='54' fill='#FFFFFF' fill-opacity='0.2'/>
  </g>

  <g font-family='"Space Grotesk", sans-serif' fill='#ECF2FF'>
    <text x='220' y='306' font-size='54' letter-spacing='8' opacity='0.86'>SONIC LIFESTYLE SERIES</text>
    <text x='220' y='395' font-size='94' font-weight='700'>SPEAKER PERFORMANCE SCENE</text>
    <text x='220' y='2020' font-size='30' letter-spacing='5' opacity='0.72'>AI-STYLED CONCEPT MODEL VISUAL  •  4K ARTBOARD  •  PREMIUM DARK GRADIENT THEME</text>
  </g>
</svg>
