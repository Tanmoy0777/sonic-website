      <circle cx='51' cy='96' r='1' fill='#FFFFFF' fill-opacity='0.07'/>
      <circle cx='91' cy='31' r='1' fill='#FFFFFF' fill-opacity='0.05'/>
      <circle cx='21' cy='111' r='1' fill='#FFFFFF' fill-opacity='0.09'/>
    </pattern>
  </defs>
  <rect width='3840' height='2160' fill='url(#bg)'/>
  <rect width='3840' height='2160' fill='url(#glowA)'/>
  <rect width='3840' height='2160' fill='url(#glowB)'/>
  <rect width='3840' height='2160' fill='url(#grain)'/>
  <ellipse cx='1920' cy='1680' rx='860' ry='180' fill='#010207' fill-opacity='0.7' filter='url(#soft)'/>

  <g transform='translate(1920 1130) rotate(-5)' filter='url(#drop)'>
    <path d='M-450 -140 C-450 -470 -170 -650 0 -660 C170 -650 450 -470 450 -140' stroke='url(#metal)' stroke-width='48' fill='none' stroke-linecap='round'/>
    <g transform='translate(-510 40)'>
      <ellipse cx='0' cy='220' rx='212' ry='292' fill='#0A0F16'/>
      <ellipse cx='0' cy='220' rx='180' ry='252' fill='url(#body)'/>
      <ellipse cx='-38' cy='144' rx='88' ry='80' fill='url(#highlight)'/>
      <ellipse cx='0' cy='220' rx='146' ry='198' fill='none' stroke='#0B0F18' stroke-width='28'/>
    </g>
    <g transform='translate(510 40)'>
      <ellipse cx='0' cy='220' rx='212' ry='292' fill='#0A0F16'/>
      <ellipse cx='0' cy='220' rx='180' ry='252' fill='url(#body)'/>
      <ellipse cx='-38' cy='144' rx='88' ry='80' fill='url(#highlight)'/>
      <ellipse cx='0' cy='220' rx='146' ry='198' fill='none' stroke='#0B0F18' stroke-width='28'/>
    </g>
    <ellipse cx='0' cy='-560' rx='180' ry='60' fill='#5788FF' fill-opacity='0.18'/>
  </g>


  <g font-family='"Space Grotesk", "Avenir Next", sans-serif' fill='#F5F8FF'>
    <text x='220' y='280' font-size='50' letter-spacing='9' opacity='0.86'>SONIC</text>
    <text x='220' y='350' font-size='94' font-weight='700'>SONIC FLUX ANC</text>
    <text x='220' y='422' font-size='44' opacity='0.84'>OVER-EAR WIRELESS ANC   /   COBALT</text>
    <text x='220' y='2030' font-size='30' letter-spacing='5' opacity='0.7'>AAUDIO ECOSYSTEM  •  SPATIAL AUDIO  •  APP-CONTROLLED EQ  •  HYBRID ANC</text>
